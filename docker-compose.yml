# EStoreFront — Docker Compose (Development)
# Usage: docker compose up -d

services:
  # ─── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: estorefont
      POSTGRES_PASSWORD: estorefont_dev
      POSTGRES_DB: estorefont_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estorefont -d estorefont_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://estorefont:estorefont_dev@postgres:5432/estorefont_db?schema=public
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # ─── AI Service ───────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://estorefont:estorefont_dev@postgres:5432/estorefont_db?schema=public
      PORT: 8000
      FRONTEND_URL: http://localhost:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
    depends_on:
      - backend
      - ai-service

volumes:
  postgres_data:
  redis_data:
